<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UHD Bots | Premium Stream</title>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;800&family=Space+Grotesk:wght@300;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <link href="https://unpkg.com/@videojs/themes@1.0.1/dist/city/index.css" rel="stylesheet">

    <style>
        :root {
            --accent: #00f2ff;
            --secondary: #7000ff;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #020205;
            color: #fff;
            font-family: 'Outfit', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Three.js Canvas Container */
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.6;
        }

        /* Navbar with Blur */
        nav {
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(15px);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid var(--border);
        }

        .logo {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(to right, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .main-wrapper {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
            animation: fadeInUp 1s ease-out;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Premium Video Box */
        .video-card {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 30px;
            overflow: hidden;
            backdrop-filter: blur(25px);
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
        }

        .vjs-matrix.video-js {
            width: 100%;
            aspect-ratio: 16/9;
            font-family: 'Outfit', sans-serif;
        }

        .info-panel {
            padding: 35px;
        }

        .status-tag {
            display: inline-block;
            background: linear-gradient(45deg, var(--secondary), var(--accent));
            padding: 6px 15px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 800;
            margin-bottom: 15px;
            box-shadow: 0 0 20px rgba(112, 0, 255, 0.4);
        }

        .movie-title {
            font-size: 2.2rem;
            margin-bottom: 25px;
            letter-spacing: -1px;
            line-height: 1.2;
        }

        /* Neon Action Buttons */
        .action-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .btn-neon {
            background: var(--glass);
            border: 1px solid var(--border);
            color: #fff;
            padding: 18px;
            border-radius: 18px;
            text-align: center;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-neon:hover {
            background: #fff;
            color: #000;
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(255,255,255,0.2);
        }

        .btn-dl {
            background: linear-gradient(45deg, #00f2ff, #006aff);
            border: none;
            color: #000;
        }

        /* External App Links */
        .app-panel {
            background: rgba(255,255,255,0.02);
            padding: 20px;
            border-radius: 20px;
            margin-top: 20px;
        }

        .app-grid {
            display: flex;
            gap: 15px;
            overflow-x: auto;
            padding: 10px 0;
        }

        .app-chip {
            min-width: 120px;
            background: var(--glass);
            border: 1px solid var(--border);
            padding: 12px;
            border-radius: 15px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
        }

        .app-chip:hover { border-color: var(--accent); background: rgba(0,242,255,0.1); }

        /* Telegram Box */
        .tg-card {
            margin-top: 40px;
            background: linear-gradient(135deg, rgba(36, 161, 222, 0.2), rgba(0,0,0,0));
            border: 1px solid rgba(36, 161, 222, 0.3);
            border-radius: 30px;
            padding: 40px;
            text-align: center;
        }

        .tg-btn {
            display: inline-block;
            background: #24A1DE;
            color: #fff;
            padding: 15px 40px;
            border-radius: 100px;
            text-decoration: none;
            font-weight: 700;
            margin-top: 20px;
            transition: 0.3s;
        }

        .tg-btn:hover { box-shadow: 0 0 30px #24A1DE; transform: scale(1.05); }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            .movie-title { font-size: 1.5rem; }
            .action-row { grid-template-columns: 1fr 1fr; }
            .btn-dl { grid-column: span 2; }
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <nav>
        <div class="logo">UHD BOTS</div>
        <a href="https://t.me/UHDBots" style="color:var(--accent); text-decoration:none;"><i class="fab fa-telegram"></i> Join</a>
    </nav>

    <div class="main-wrapper">
        <div class="video-card">
            <video id="uhd-player" class="video-js vjs-theme-city" controls preload="auto" data-setup='{}'>
                <source src="{{file_url}}" type="video/mp4">
                <source src="{{file_url}}" type="video/webm">
                </video>

            <div class="info-panel">
                <div class="status-tag"><i class="fas fa-crown"></i> UHD PREMIUM QUALITY</div>
                <h1 class="movie-title" id="title-text">{{file_name}}</h1>

                <div class="action-row">
                    <a href="#" class="btn-neon btn-dl" onclick="handleDownload()">
                        <i class="fas fa-download"></i> Download High Speed
                    </a>
                    <button class="btn-neon" onclick="copyLink()">
                        <i class="fas fa-link"></i> Copy
                    </button>
                    <button class="btn-neon" onclick="shareMe()">
                        <i class="fas fa-share-alt"></i> Share
                    </button>
                </div>

                <div class="app-panel">
                    <p style="font-size:13px; color:#aaa; margin-bottom:10px;">PLAY IN EXTERNAL APP (Fixes Audio/Subtitle Issues)</p>
                    <div class="app-grid">
                        <div class="app-chip" onclick="launchApp('vlc')"><i class="fas fa-play"></i><br>VLC</div>
                        <div class="app-chip" onclick="launchApp('mx')"><i class="fas fa-play"></i><br>MX Player</div>
                        <div class="app-chip" onclick="launchApp('playit')"><i class="fas fa-play"></i><br>PlayIt</div>
                        <div class="app-chip" onclick="launchApp('nplayer')"><i class="fas fa-play"></i><br>nPlayer</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="tg-card">
            <h2>Join Our Master Channel</h2>
            <p>Get instant access to 4K Movies, Series and Latest Bots</p>
            <a href="https://t.me/UHDBots" class="tg-btn">@UHDBots</a>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>

    <script>
        // 1. Three.js Background Animation
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const geometry = new THREE.TorusKnotGeometry(10, 3, 100, 16);
        const material = new THREE.MeshPhongMaterial({ color: 0x7000ff, wireframe: true });
        const torusKnot = new THREE.Mesh(geometry, material);
        scene.add(torusKnot);

        const light = new THREE.PointLight(0xffffff, 1, 100);
        light.position.set(10, 10, 10);
        scene.add(light);
        camera.position.z = 30;

        function animate() {
            requestAnimationFrame(animate);
            torusKnot.rotation.x += 0.005;
            torusKnot.rotation.y += 0.005;
            renderer.render(scene, camera);
        }
        animate();

        // 2. File Name Cleaning
        const titleEl = document.getElementById('title-text');
        let rawName = titleEl.innerText;
        titleEl.innerText = rawName.replace(/[._\-+]/g, ' ')
                                   .replace(/\[.*?\]/g, '')
                                   .replace(/\(.*?\)/g, '')
                                   .replace(/\d{3,4}p/g, '[$&]') // Highlights 1080p, 720p
                                   .trim();

        // 3. Download Logic (Anti-Bug)
        function handleDownload() {
            const dlLink = window.location.href.replace('/watch/', '/dl/');
            const link = document.createElement('a');
            link.href = dlLink;
            link.setAttribute('download', '');
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // 4. App Intents
        const streamUrl = "{{file_url}}";
        function launchApp(type) {
            const cleanUrl = streamUrl.replace(/^https?:\/\//, '');
            let intent = "";
            if(type === 'vlc') intent = `intent://${cleanUrl}#Intent;scheme=https;package=org.videolan.vlc;end`;
            if(type === 'mx') intent = `intent://${cleanUrl}#Intent;scheme=https;package=com.mxtech.videoplayer.ad;end`;
            if(type === 'playit') intent = `intent://${cleanUrl}#Intent;scheme=https;package=com.playit.videoplayer;end`;
            
            window.location.href = intent;
        }

        function copyLink() {
            navigator.clipboard.writeText(window.location.href);
            alert("Link Copied Successfully!");
        }

        window.addEventListener('resize', () => {
            renderer.setSize(window.innerWidth, window.innerHeight);
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
        });
    </script>
</body>
</html>
