<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>%s | UHD Bots</title>
  <link rel="icon" href="https://i.ibb.co/qJyZWCv/20230629-081948-0000.png" />
  <meta property="og:title" content="%s | UHD Bots">
  <meta property="og:description" content="Download your file instantly with UHD Bots futuristic downloader 🚀">
  <meta property="og:image" content="https://i.ibb.co/qJyZWCv/20230629-081948-0000.png">
  
  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto+Mono:wght@300;400;700&display=swap" rel="stylesheet">
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  
  <!-- Animate.css -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

  <style>
    /* Reset and Base Styles */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Roboto Mono', monospace;
      background: linear-gradient(-45deg, #0a0a0a, #1c2526, #13232f, #000000);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      overflow-x: hidden;
      position: relative;
    }

    /* Gradient Animation */
    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Glassmorphism Effect */
    .glass {
      background: rgba(20, 20, 20, 0.8);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(0, 240, 255, 0.2);
      box-shadow: 0 0 20px rgba(0, 240, 255, 0.3);
    }

    /* Header */
    header {
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: relative;
      z-index: 10;
    }

    header h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.8rem;
      color: #00f0ff;
      text-shadow: 0 0 10px rgba(0, 240, 255, 0.7);
    }

    /* Theme Toggle Button */
    .theme-btn {
      background: transparent;
      border: 2px solid #00f0ff;
      color: #00f0ff;
      padding: 0.5rem 1rem;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .theme-btn:hover {
      background: #00f0ff;
      color: #000;
      box-shadow: 0 0 15px rgba(0, 240, 255, 0.5);
    }

    /* Main Content */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }

    main h2 {
      font-family: 'Orbitron', sans-serif;
      font-size: 3rem;
      color: #00f0ff;
      text-shadow: 0 0 15px rgba(0, 240, 255, 0.7);
      margin-bottom: 1rem;
      animation: neon-flicker 4s infinite;
    }

    @keyframes neon-flicker {
      0%, 100% { text-shadow: 0 0 15px rgba(0, 240, 255, 0.7), 0 0 30px rgba(0, 240, 255, 0.5); }
      50% { text-shadow: 0 0 10px rgba(0, 240, 255, 0.4), 0 0 20px rgba(0, 240, 255, 0.2); }
    }

    main p {
      font-size: 1.2rem;
      color: #b0b0b0;
      margin-bottom: 2rem;
    }

    /* Download Button */
    .glow-btn {
      display: inline-block;
      padding: 1rem 2.5rem;
      font-size: 1.2rem;
      font-weight: 700;
      color: #fff;
      background: linear-gradient(90deg, #00f0ff, #ff00ff);
      background-size: 300% 300%;
      animation: glowMove 6s ease infinite;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
      box-shadow: 0 0 20px rgba(0, 240, 255, 0.5);
    }

    .glow-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 30px rgba(0, 240, 255, 0.7);
      background: linear-gradient(90deg, #ff00ff, #00f0ff);
    }

    .glow-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(
        90deg,
        transparent,
        rgba(255, 255, 255, 0.2),
        transparent
      );
      transition: 0.5s;
    }

    .glow-btn:hover::before {
      left: 100%;
    }

    @keyframes glowMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* QR Code */
    #qrCode {
      margin: 1.5rem 0;
      padding: 1rem;
      background: rgba(0, 0, 0, 0.5);
      border-radius: 10px;
      box-shadow: 0 0 15px rgba(0, 240, 255, 0.3);
    }

    /* Footer */
    footer {
      padding: 1rem;
      font-size: 0.9rem;
      color: #b0b0b0;
    }

    footer p {
      text-shadow: 0 0 5px rgba(0, 240, 255, 0.3);
    }

    /* Particle Background */
    .particles {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      background: rgba(0, 240, 255, 0.5);
      border-radius: 50%;
      animation: float 10s infinite linear;
    }

    @keyframes float {
      0% { transform: translateY(100vh) scale(0); }
      100% { transform: translateY(-100vh) scale(1); }
    }

    /* Responsive Design */
    @media (max-width: 768px) {
      main h2 {
        font-size: 2rem;
      }

      .glow-btn {
        padding: 0.8rem 2rem;
        font-size: 1rem;
      }

      header h1 {
        font-size: 1.5rem;
      }
    }

    @media (max-width: 480px) {
      main h2 {
        font-size: 1.8rem;
      }

      .glow-btn {
        padding: 0.7rem 1.5rem;
        font-size: 0.9rem;
      }

      #qrCode {
        width: 150px;
      }
    }

    /* Light Theme */
    body.light-theme {
      background: linear-gradient(-45deg, #e0e0e0, #f5f5f5, #d0d0d0, #ffffff);
      color: #1a1a1a;
    }

    body.light-theme .glass {
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid rgba(0, 0, 0, 0.2);
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
    }

    body.light-theme main h2 {
      color: #007bff;
      text-shadow: 0 0 10px rgba(0, 123, 255, 0.5);
    }

    body.light-theme main p,
    body.light-theme footer p {
      color: #4a4a4a;
    }

    body.light-theme .glow-btn {
      background: linear-gradient(90deg, #007bff, #ff6f61);
    }

    body.light-theme .glow-btn:hover {
      background: linear-gradient(90deg, #ff6f61, #007bff);
      box-shadow: 0 0 20px rgba(0, 123, 255, 0.5);
    }

    body.light-theme .theme-btn {
      border: 2px solid #007bff;
      color: #007bff;
    }

    body.light-theme .theme-btn:hover {
      background: #007bff;
      color: #fff;
    }
  </style>
</head>
<body>
  <div class="particles" id="particles"></div>
  
  <!-- Header -->
  <header class="glass p-4 flex justify-between items-center">
    <h1 class="animate_animated animate_fadeIn">⚡️ UHD Bots</h1>
    <button onclick="toggleTheme()" class="theme-btn">
      <i id="themeIcon" class="bi bi-moon-stars-fill"></i>
    </button>
  </header>

  <!-- Main Content -->
  <main class="flex flex-col items-center justify-center text-center p-6 flex-1">
    <h2 class="animate_animated animate_fadeInDown">%s</h2>
    <p class="animate_animated animate_fadeIn">Your futuristic download is ready 🚀</p>
    <canvas id="qrCode" class="animate_animated animate_zoomIn"></canvas>
    <button class="glow-btn animate_animated animatepulse animate_infinite" onclick="copyLink()">Copy Download Link</button>
    <button class="glow-btn animate_animated animatepulse animate_infinite" onclick="downloadFile()">Download Now</button>
  </main>

  <!-- Footer -->
  <footer class="glass text-center py-4">
    <p class="animate_animated animate_fadeInUp">Made with ❤️ by UHD Bots</p>
  </footer>

  <!-- QR Code and Theme JS -->
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
  <script>
    // Copy Link
    function copyLink() {
      navigator.clipboard.writeText("%s").then(() => {
        alert("✅ Link copied!");
      }).catch(err => {
        console.error('Failed to copy: ', err);
        alert("❌ Failed to copy link!");
      });
    }

    // Generate QR Code
    function generateQR() {
      document.getElementById("qrCode").innerHTML = "";
      QRCode.toCanvas(document.getElementById("qrCode"), "%s", { width: 180 }, function (err) {
        if (err) console.error(err);
      });
    }

    // Theme Toggle
    function toggleTheme() {
      document.body.classList.toggle("light-theme");
      const icon = document.getElementById("themeIcon");
      icon.classList.toggle("bi-brightness-high-fill");
      icon.classList.toggle("bi-moon-stars-fill");
    }

    // Download File Placeholder
    function downloadFile() {
      alert("🚀 Initiating download...");
      // Replace with actual download logic, e.g., window.location.href = "%s";
    }

    // Particle Animation
    const particlesContainer = document.getElementById('particles');
    function createParticle() {
      const particle = document.createElement('div');
      particle.classList.add('particle');
      particle.style.width = ${Math.random() * 5 + 2}px;
      particle.style.height = particle.style.width;
      particle.style.left = ${Math.random() * 100}%;
      particle.style.animationDuration = ${Math.random() * 5 + 5}s;
      particle.style.opacity = Math.random() * 0.5 + 0.2;
      particlesContainer.appendChild(particle);
      setTimeout(() => particle.remove(), 10000);
    }

    setInterval(createParticle, 300);

    // Initialize QR Code on Load
    window.onload = generateQR;
  </script>
</body>
</html>
