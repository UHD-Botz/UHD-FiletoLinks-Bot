<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UHD Bots | Premium Stream</title>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;800&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        :root {
            --accent: #00f2ff;
            --secondary: #7000ff;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #020205;
            color: #fff;
            font-family: 'Outfit', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }

        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.5;
        }

        nav {
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(15px);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid var(--border);
        }

        .logo {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(to right, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .main-wrapper {
            max-width: 1100px;
            margin: 30px auto;
            padding: 0 15px;
            animation: fadeInUp 0.8s ease-out;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* The Container */
        .video-card {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 24px;
            overflow: hidden;
            backdrop-filter: blur(20px);
            box-shadow: 0 30px 80px rgba(0,0,0,0.7);
        }

        /* Native Google/Chrome Style Player */
        video {
            width: 100%;
            display: block;
            aspect-ratio: 16/9;
            background: #000;
            outline: none;
        }

        .info-panel {
            padding: 25px;
        }

        .status-tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: linear-gradient(45deg, var(--secondary), var(--accent));
            padding: 5px 12px;
            border-radius: 50px;
            font-size: 11px;
            font-weight: 800;
            margin-bottom: 12px;
            text-transform: uppercase;
        }

        .movie-title {
            font-size: 1.6rem;
            margin-bottom: 20px;
            font-weight: 700;
            letter-spacing: -0.5px;
            word-break: break-word;
        }

        /* Action Buttons */
        .action-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            margin-bottom: 25px;
        }

        .btn-uhd {
            background: var(--glass);
            border: 1px solid var(--border);
            color: #fff;
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
        }

        .btn-uhd:hover {
            background: rgba(255,255,255,0.1);
            border-color: #fff;
            transform: translateY(-3px);
        }

        .btn-primary {
            background: #fff;
            color: #000;
            border: none;
        }

        .btn-primary:hover {
            background: var(--accent);
            color: #000;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.4);
        }

        /* External Apps */
        .app-section {
            background: rgba(255,255,255,0.02);
            padding: 15px;
            border-radius: 18px;
            border: 1px solid var(--border);
        }

        .app-list {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 5px 0;
        }

        .app-list::-webkit-scrollbar { display: none; }

        .app-item {
            min-width: 100px;
            background: var(--glass);
            padding: 10px;
            border-radius: 12px;
            text-align: center;
            font-size: 12px;
            border: 1px solid var(--border);
            cursor: pointer;
        }

        .app-item:hover { border-color: var(--accent); }

        .tg-join {
            margin-top: 30px;
            background: linear-gradient(135deg, rgba(36, 161, 222, 0.1), transparent);
            border: 1px solid rgba(36, 161, 222, 0.2);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
        }

        .tg-link {
            color: #24A1DE;
            font-weight: 800;
            text-decoration: none;
            font-size: 1.2rem;
            display: block;
            margin-top: 10px;
        }

        @media (max-width: 600px) {
            .movie-title { font-size: 1.3rem; }
            .action-row { grid-template-columns: 1fr 1fr; }
            .full-mobile { grid-column: span 2; }
        }
    </style>
</head>
