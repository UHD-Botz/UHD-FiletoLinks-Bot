<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UHD File Stream</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Poppins:wght@400;700&display=swap" rel="stylesheet">
  <style>
    /* Ultra Futuristic Animated Gradient Background */
    body {
      margin: 0;
      font-family: "Orbitron", "Poppins", sans-serif;
      background: linear-gradient(135deg, #23a6d5, #0f2027, #100720, #ff00cc, #333399);
      background-size: 600% 600%;
      animation: gradientBG 18s ease infinite;
      min-height: 100vh;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    @keyframes gradientBG {
      0% {background-position:0% 50%;}
      50% {background-position:100% 50%;}
      100% {background-position:0% 50%;}
    }
    .container {
      backdrop-filter: blur(16px) brightness(1.2);
      background: rgba(20, 20, 40, 0.65);
      border-radius: 20px;
      box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37), 0 0 16px #23a6d5, 0 0 32px #ff00cc;
      padding: 48px 40px;
      max-width: 400px;
      width: calc(100vw - 24px);
      border: 2px solid rgba(255,255,255,0.16);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 36px;
      position: relative;
    }
    h1 {
      font-size: 2.3rem;
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      letter-spacing: 3px;
      color: #fff;
      text-shadow: 0 0 22px #23a6d5, 0 0 12px #ff00cc;
      margin-bottom: 0;
    }
    .info {
      font-size: 1.15rem;
      color: #eee;
      font-family: 'Poppins', sans-serif;
      margin-bottom: 18px;
      letter-spacing: 1px;
    }
    .file-link {
      background: linear-gradient(90deg, #23a6d5 0%, #ff00cc 100%);
      color: #fff;
      padding: 12px 22px;
      font-size: 1.1rem;
      border-radius: 12px;
      box-shadow: 0 0 16px #33339944;
      border: none;
      outline: none;
      transition: transform 0.14s, box-shadow 0.14s;
      cursor: pointer;
      font-family: 'Orbitron', sans-serif;
      text-decoration: none;
      font-weight: 500;
      margin-bottom: 22px;
      position: relative;
    }
    .file-link:hover {
      transform: scale(1.07);
      box-shadow: 0 0 24px #33339988;
      background: linear-gradient(90deg, #ff00cc 0%, #23a6d5 100%);
    }
    .copy-btn {
      background: rgba(36, 255, 206, 0.12);
      color: #1fefef;
      border: 2px solid #1fefef44;
      border-radius: 8px;
      padding: 10px 18px;
      font-size: 1rem;
      cursor: pointer;
      box-shadow: 0 0 12px #23a6d544;
      text-transform: uppercase;
      letter-spacing: 2px;
      font-family: 'Orbitron', sans-serif;
      transition: background 0.21s, border 0.21s;
    }
    .copy-btn:hover {
      background: rgba(36, 255, 206, 0.32);
      border: 2px solid #23a6d5;
    }
    /* Hi-tech accent lines */
    .container::before, .container::after {
      content: "";
      position: absolute;
      border-radius: 40px;
      pointer-events: none;
      z-index: 0;
    }
    .container::before {
      top: -16px; right: -16px;
      width: 70px; height: 70px;
      border-top: 4px solid #23a6d5;
      border-right: 4px solid #ff00cc;
      box-shadow: 0 0 20px #23a6d5, 0 0 16px #ff00cc;
    }
    .container::after {
      left: -16px; bottom: -16px;
      width: 70px; height: 70px;
      border-bottom: 4px solid #23a6d5;
      border-left: 4px solid #ff00cc;
      box-shadow: 0 0 14px #23a6d5, 0 0 18px #ff00cc;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🚀 UHD File Stream</h1>
    <div class="info">Access your ultra high-definition file securely with next-gen technology.</div>
    <a class="file-link" href="{{ file_url }}" target="_blank">Open UHD File</a>
    <button class="copy-btn" onclick="copyLink()">Copy Link</button>
  </div>
  <script>
    function copyLink() {
      navigator.clipboard.writeText("{{ file_url }}");
      alert("✅ Link copied to clipboard!");
    }
  </script>
</body>
</html>
