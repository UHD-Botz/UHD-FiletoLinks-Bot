        .btn-uhd { background: var(--glass); border: 1px solid var(--border); color: #fff; padding: 15px; border-radius: 15px; text-align: center; text-decoration: none; font-weight: 600; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px; cursor: pointer; }
        .btn-uhd:hover { background: rgba(255,255,255,0.1); border-color: #fff; transform: translateY(-3px); }
