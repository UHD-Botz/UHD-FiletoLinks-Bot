<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UHD Bots | Premium Stream</title>
    
    <link rel="icon" type="image/png" href="https://i.postimg.cc/Hkwyv5m9/upscalemedia-transformed.png">
    <link rel="apple-touch-icon" href="https://i.postimg.cc/Hkwyv5m9/upscalemedia-transformed.png">

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;800&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        :root { --accent: #00f2ff; --secondary: #7000ff; --glass: rgba(255, 255, 255, 0.03); --border: rgba(255, 255, 255, 0.1); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #020205; color: #fff; font-family: 'Outfit', sans-serif; overflow-x: hidden; min-height: 100vh; }
        #canvas-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.5; }
        nav { padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.6); backdrop-filter: blur(15px); position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--border); }
        .logo { font-family: 'Space Grotesk', sans-serif; font-size: 22px; font-weight: 700; background: linear-gradient(to right, #fff, var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .main-wrapper { max-width: 1100px; margin: 30px auto; padding: 0 15px; animation: fadeInUp 0.8s ease-out; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .video-card { background: var(--glass); border: 1px solid var(--border); border-radius: 24px; overflow: hidden; backdrop-filter: blur(20px); box-shadow: 0 30px 80px rgba(0,0,0,0.7); }
        video { width: 100%; display: block; aspect-ratio: 16/9; background: #000; outline: none; }
        .info-panel { padding: 25px; }
        .status-tag { display: inline-flex; align-items: center; gap: 6px; background: linear-gradient(45deg, var(--secondary), var(--accent)); padding: 5px 12px; border-radius: 50px; font-size: 11px; font-weight: 800; margin-bottom: 12px; text-transform: uppercase; }
        .movie-title { font-size: 1.6rem; margin-bottom: 20px; font-weight: 700; letter-spacing: -0.5px; word-break: break-word; }
        .action-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 25px; }
        .btn-uhd { background: var(--glass); border: 1px solid var(--border); color: #fff; padding: 15px; border-radius: 15px; text-align: center; text-decoration: none; font-weight: 600; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px; cursor: pointer; }
        .btn-uhd:hover { background: rgba(255,255,255,0.1); border-color: #fff; transform: translateY(-3px); }
        .btn-primary { background: #fff; color: #000; border: none; }
        .btn-primary:hover { background: var(--accent); color: #000; box-shadow: 0 0 20px rgba(0, 242, 255, 0.4); }
        .app-section { background: rgba(255,255,255,0.02); padding: 15px; border-radius: 18px; border: 1px solid var(--border); }
        .app-list { display: flex; gap: 10px; overflow-x: auto; padding: 5px 0; }
        .app-list::-webkit-scrollbar { display: none; }
        .app-item { min-width: 100px; background: var(--glass); padding: 10px; border-radius: 12px; text-align: center; font-size: 12px; border: 1px solid var(--border); cursor: pointer; }
        .app-item:hover { border-color: var(--accent); }
        .tg-join { margin-top: 30px; background: linear-gradient(135deg, rgba(36, 161, 222, 0.1), transparent); border: 1px solid rgba(36, 161, 222, 0.2); border-radius: 20px; padding: 30px; text-align: center; }
        .tg-link { color: #24A1DE; font-weight: 800; text-decoration: none; font-size: 1.2rem; display: block; margin-top: 10px; }
        @media (max-width: 600px) { .movie-title { font-size: 1.3rem; } .action-row { grid-template-columns: 1fr 1fr; } .full-mobile { grid-column: span 2; } }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <nav>
        <div class="logo nav-logo">UHD BOTS</div>
        <a href="https://t.me/UHDBots" style="color:var(--accent); text-decoration:none;"><i class="fab fa-telegram"></i></a>
    </nav>
    <div class="main-wrapper">
        <div class="video-card">
            <video id="main-player" controls poster="https://i.postimg.cc/Hkwyv5m9/upscalemedia-transformed.png" preload="metadata">
                <source src="{{file_url}}" type="video/mp4">
            </video>
            <div class="info-panel">
                <div class="status-tag"><i class="fas fa-check-circle"></i> Google Native Engine</div>
                <h1 class="movie-title" id="clean-title">{{file_name}}</h1>
                <div class="action-row">
                    <a href="#" class="btn-uhd btn-primary full-mobile" onclick="startDownload()"><i class="fas fa-download"></i> Direct Download</a>
                    <div class="btn-uhd" onclick="copyLink()"><i class="fas fa-link"></i> Copy</div>
                    <div class="btn-uhd" onclick="sharePage()"><i class="fas fa-share-alt"></i> Share</div>
                </div>
                <div class="app-section">
                    <p style="font-size:11px; opacity:0.6; margin-bottom:10px;">FAST PLAY IN EXTERNAL APPS</p>
                    <div class="app-list">
                        <div class="app-item" onclick="launchApp('vlc')"><i class="fas fa-play"></i><br>VLC</div>
                        <div class="app-item" onclick="launchApp('mx')"><i class="fas fa-play"></i><br>MX Player</div>
                        <div class="app-item" onclick="launchApp('playit')"><i class="fas fa-play"></i><br>PlayIt</div>
                        <div class="app-item" onclick="launchApp('km')"><i class="fas fa-play"></i><br>KM Player</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="tg-join">
            <p style="opacity:0.7; font-size:14px;">Powered By</p>
            <a href="https://t.me/UHDBots" class="tg-link footer-logo">UHD Bots</a>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // Visuals Init
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);
        const sphere = new THREE.Mesh(new THREE.IcosahedronGeometry(15, 1), new THREE.MeshBasicMaterial({ color: 0x7000ff, wireframe: true, transparent: true, opacity: 0.2 }));
        scene.add(sphere); camera.position.z = 30;
        function animate() { requestAnimationFrame(animate); sphere.rotation.y += 0.002; sphere.rotation.x += 0.001; renderer.render(scene, camera); }
        animate();

        // Utilities
        const titleEl = document.getElementById('clean-title');
        if(titleEl) {
            titleEl.innerText = titleEl.innerText.replace(/[._\-+]/g, ' ').replace(/\[.*?\]/g, '').replace(/\(.*?\)/g, '').trim();
        }

       
        (function(w, d) {
            const _v = () => {
                const n = d.querySelector('.nav-logo');
                const f = d.querySelector('.footer-logo');
                const a = d.querySelectorAll('a');
                let c = false;
                a.forEach(l => { if(l.href.toLowerCase().indexOf('uhdbots') > -1) c = true; });
                if (!n || !n.innerText.includes('UHD BOTS') || !f || !c) {
                    d.body.innerHTML = '<div style="background:#000;color:#ff0044;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:sans-serif;text-align:center;"><h1>CRITICAL ERROR: CREDITS REMOVED</h1><p>System Halted. Please use original bot.</p></div>';
                    setInterval(() => { (function(){}).constructor("debugger")(); }, 50);
                }
            };
            setInterval(_v, 4000);
            w.onload = _v;
        })(window, document);

        // --- PLAYER LOGIC ---
        const rawUrl = "{{file_url}}";

        function startDownload() { window.location.href = window.location.href.replace('/watch/', '/dl/'); }
        function copyLink() { navigator.clipboard.writeText(window.location.href); alert("Link Copied!"); }
        function sharePage() { if (navigator.share) { navigator.share({ title: 'Stream UHD', url: window.location.href }); } }

        function launchApp(app) {
            if (!rawUrl || rawUrl.includes("{")) return;
            const fileName = document.getElementById('clean-title').innerText;
            const encodedTitle = encodeURIComponent(fileName);
            const cleanUrl = rawUrl.replace(/^https?:\/\//, '');
            let intent = "";

            if (app === 'vlc') {
                intent = `intent://${cleanUrl}#Intent;scheme=https;package=org.videolan.vlc;action=android.intent.action.VIEW;type=video/*;S.title=${encodedTitle};end`;
            } else if (app === 'mx') {
                intent = `intent://${cleanUrl}#Intent;scheme=https;package=com.mxtech.videoplayer.ad;action=android.intent.action.VIEW;type=video/*;S.title=${encodedTitle};end`;
            } else if (app === 'playit') {
                intent = `intent://${cleanUrl}#Intent;scheme=https;package=com.playit.videoplayer;action=android.intent.action.VIEW;type=video/*;end`;
            } else if (app === 'km') {
                intent = `intent://${cleanUrl}#Intent;scheme=https;package=com.kmplayer;action=android.intent.action.VIEW;type=video/*;end`;
            }

            if (intent !== "") {
                window.location.assign(intent);
            }
        }

        window.addEventListener('resize', () => {
            renderer.setSize(window.innerWidth, window.innerHeight);
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
        });
    </script>
</body>
</html>
