<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UHD Bots - {{file_name}}</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --primary: #9333ea;
            --secondary: #c084fc;
            --bg-dark: #09011a;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-dim: #a78bfa;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 20% 20%, rgba(147, 51, 234, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(192, 132, 252, 0.1) 0%, transparent 40%);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Navbar */
        .navbar {
            padding: 1.5rem;
            display: flex;
            justify-content: center;
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(9, 1, 26, 0.8);
            backdrop-filter: blur(10px);
        }

        .nav-logo {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(to right, #fff, var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .main-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 1rem;
        }

        /* Player Section */
        .player-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            margin-bottom: 2rem;
        }

        .video-wrapper {
            position: relative;
            background: #000;
            aspect-ratio: 16/9;
        }

        /* Info Section */
        .info-content {
            padding: 1.5rem;
        }

        .badge-group {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
        }

        .badge {
            background: rgba(147, 51, 234, 0.2);
            color: var(--secondary);
            padding: 4px 12px;
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            border: 1px solid rgba(147, 51, 234, 0.3);
        }

        .file-title {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            line-height: 1.3;
        }

        /* Buttons Styling */
        .action-grid {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr;
            gap: 12px;
            margin-bottom: 1.5rem;
        }

        .btn-main {
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 14px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: 0.3s;
            text-decoration: none;
        }

        .btn-main:hover {
            background: var(--secondary);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(147, 51, 234, 0.3);
        }

        .btn-sec {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 14px;
            border-radius: 14px;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-sec:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        /* External Player Panel */
        .ext-panel {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            padding: 15px;
            margin-top: 15px;
        }

        .ext-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 10px;
        }

        .ext-item {
            background: var(--bg-dark);
            border: 1px solid var(--glass-border);
            padding: 10px;
            border-radius: 12px;
            text-align: center;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.3s;
        }

        .ext-item:hover {
            border-color: var(--primary);
            color: var(--secondary);
        }

        /* Warning Box */
        .audio-notice {
            background: rgba(239, 68, 68, 0.1);
            border: 1px dashed #ef4444;
            padding: 12px;
            border-radius: 12px;
            font-size: 0.85rem;
            color: #fca5a5;
            margin-top: 20px;
            display: none;
        }

        /* Footer Links */
        .footer-card {
            text-align: center;
            padding: 2rem;
            background: var(--glass);
            border-radius: 24px;
            border: 1px solid var(--glass-border);
        }

        .social-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            background: #24A1DE;
            color: white;
            border-radius: 100px;
            text-decoration: none;
            font-weight: 600;
            margin: 10px;
        }

        @media (max-width: 600px) {
            .action-grid { grid-template-columns: 1fr; }
            .ext-grid { grid-template-columns: 1fr 1fr; }
            .file-title { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-logo">UHD Bots</div>
    </nav>

    <div class="main-container">
        <div class="player-card">
            <div class="video-wrapper">
                <video id="player" playsinline controls preload="metadata">
                    <source src="{{file_url}}" type="video/mp4">
                </video>
            </div>

            <div class="info-content">
                <div class="badge-group">
                    <span class="badge">4K Ultra HD</span>
                    <span class="badge"><i class="fas fa-bolt"></i> Fast Stream</span>
                </div>
                
                <h1 class="file-title" id="display-name">{{file_name}}</h1>

                <div class="action-grid">
                    <a href="#" class="btn-main" onclick="downloadFile()">
                        <i class="fas fa-cloud-download-alt"></i> Download Now
                    </a>
                    <button class="btn-sec" onclick="copyUrl()" id="copyBtn">
                        <i class="fas fa-link"></i>
                    </button>
                    <button class="btn-sec" onclick="shareUrl()">
                        <i class="fas fa-share-alt"></i>
                    </button>
                </div>

                <div class="ext-panel">
                    <p style="font-size: 0.85rem; font-weight: 600; color: var(--text-dim);">OPEN IN APP</p>
                    <div class="ext-grid">
                        <div class="ext-item" onclick="openVLC()"><i class="fas fa-play"></i><br>VLC</div>
                        <div class="ext-item" onclick="openMX()"><i class="fas fa-play"></i><br>MX Player</div>
                        <div class="ext-item" onclick="openPlayIt()"><i class="fas fa-play"></i><br>PlayIt</div>
                    </div>
                </div>

                <div class="audio-notice" id="audio-warning">
                    <i class="fas fa-exclamation-triangle"></i> Browser audio issues? Use external players for best sound.
                </div>
            </div>
        </div>

        <div class="footer-card">
            <h3>Join Our Community</h3>
            <p style="color: var(--text-dim); margin-bottom: 1rem;">Get latest updates and more bots.</p>
            <a href="https://t.me/UHDBots" class="social-btn">
                <i class="fab fa-telegram-plane"></i> Telegram Channel
            </a>
            <p style="margin-top: 1.5rem; font-size: 0.8rem; opacity: 0.5;">&copy; 2026 UHD Bots. All Rights Reserved.</p>
        </div>
    </div>

    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
    <script>
        // Initialize Player
        const player = new Plyr('#player', {
            controls: ['play-large', 'play', 'progress', 'current-time', 'duration', 'mute', 'volume', 'settings', 'fullscreen'],
            settings: ['quality', 'speed']
        });

        const fileUrl = "{{file_url}}";
        const cleanUrl = fileUrl.replace('/watch/', '/dl/');

        // Clean Title Function
        function cleanFileName() {
            const el = document.getElementById('display-name');
            let name = el.textContent;
            name = name.replace(/[._\-+]/g, ' ')
                       .replace(/\[.*?\]/g, '')
                       .replace(/\(.*?\)/g, '')
                       .trim();
            el.textContent = name;
        }

        // Functions
        function downloadFile() {
            window.location.href = cleanUrl;
        }

        async function copyUrl() {
            const btn = document.getElementById('copyBtn');
            await navigator.clipboard.writeText(window.location.href);
            btn.innerHTML = '<i class="fas fa-check"></i>';
            setTimeout(() => btn.innerHTML = '<i class="fas fa-link"></i>', 2000);
        }

        function shareUrl() {
            if (navigator.share) {
                navigator.share({ title: document.title, url: window.location.href });
            }
        }

        // App Intents
        function openVLC() {
            window.location.href = `intent://${fileUrl.replace(/^https?:\/\//, '')}#Intent;scheme=https;package=org.videolan.vlc;end`;
        }
        function openMX() {
            window.location.href = `intent://${fileUrl.replace(/^https?:\/\//, '')}#Intent;scheme=https;package=com.mxtech.videoplayer.ad;end`;
        }
        function openPlayIt() {
            window.location.href = `intent://${fileUrl.replace(/^https?:\/\//, '')}#Intent;scheme=https;package=com.playit.videoplayer;end`;
        }

        document.addEventListener("DOMContentLoaded", () => {
            cleanFileName();
            // Audio check
            const v = document.createElement('video');
            if (v.canPlayType('audio/mp4; codecs="ec-3"') === '') {
                document.getElementById('audio-warning').style.display = 'block';
            }
        });
    </script>
</body>
</html>
