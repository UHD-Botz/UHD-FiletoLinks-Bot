<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UHD File Stream</title>
  <style>
    /* Futuristic gradient background */
    body {
      margin: 0;
      font-family: "Poppins", sans-serif;
      background: linear-gradient(-45deg, #0f0f0f, #1a1a1a, #121212, #000000);
      background-size: 400% 400%;
      animation: gradient 12s ease infinite;
      color: #fff;
      text-align: center;
    }

    @keyframes gradient {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .container {
      padding: 20px;
      max-width: 900px;
      margin: auto;
    }

    h1 {
      font-size: 2.5rem;
      background: linear-gradient(90deg, #00f0ff, #00ff80, #ff00ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 15px;
    }

    .card {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(12px);
      margin-bottom: 25px;
    }

    video {
      width: 100%;
      border-radius: 15px;
      border: 2px solid rgba(0, 255, 200, 0.6);
      box-shadow: 0 0 25px rgba(0, 255, 200, 0.4);
    }

    .btn-group {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      margin-top: 20px;
    }

    .btn {
      background: linear-gradient(135deg, #00f0ff, #00ff80);
      border: none;
      padding: 12px 20px;
      border-radius: 30px;
      color: #000;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.3s ease;
      box-shadow: 0 5px 15px rgba(0, 255, 200, 0.3);
    }

    .btn:hover {
      transform: translateY(-3px) scale(1.05);
      box-shadow: 0 8px 20px rgba(0, 255, 200, 0.6);
    }

    footer {
      margin-top: 30px;
      font-size: 0.9rem;
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🚀 UHD File Stream</h1>

    <div class="card">
      <h2>{{ file_name }}</h2>
      <video controls poster="{{ thumb }}" autoplay>
        <source src="{{ file_url }}" type="video/mp4" />
        Your browser does not support the video tag.
      </video>
      <p><b>Size:</b> {{ file_size }}</p>
    </div>

    <div class="btn-group">
      <a class="btn" href="{{ file_url }}" download>📥 Fast Download</a>
      <a class="btn" href="{{ file_url }}" target="_blank">🖥 Watch Online</a>
      <a class="btn" href="intent:{{ file_url }}#Intent;package=com.mxtech.videoplayer.ad;S.title={{ file_name }};end">🎬 MX Player</a>
      <a class="btn" href="vlc://{{ file_url }}">🎶 VLC Player</a>
      <button class="btn" onclick="copyLink()">📋 Copy Link</button>
    </div>

    <footer>
      ⚡ Powered by <b>UHD FiletoLinks Bot</b> | Links never expire until deleted
    </footer>
  </div>

  <script>
    function copyLink() {
      navigator.clipboard.writeText("{{ file_url }}");
      alert("✅ Link copied to clipboard!");
    }
  </script>
</body>
</html>
