<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>%s | UHD Bots</title>
  <link rel="icon" href="https://i.ibb.co/qJyZWCv/20230629-081948-0000.png" />
  <meta property="og:title" content="%s | UHD Bots">
  <meta property="og:description" content="Download your file instantly with UHD Bots futuristic downloader 🚀">
  <meta property="og:image" content="https://i.ibb.co/qJyZWCv/20230629-081948-0000.png">

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <!-- Animate -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
  
  <style>
    body {
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      background-size: 400% 400%;
      animation: gradientBG 12s ease infinite;
      font-family: 'Poppins', sans-serif;
    }
    @keyframes gradientBG {
      0% {background-position:0% 50%}
      50% {background-position:100% 50%}
      100% {background-position:0% 50%}
    }
    .glass {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.2);
    }
    .glow-btn {
      background: linear-gradient(90deg,#ff0080,#7928ca,#2afadf);
      background-size: 300% 300%;
      animation: glowMove 6s ease infinite;
      border-radius: 12px;
      padding: 1rem 2rem;
      font-weight: bold;
      color: white;
      box-shadow: 0 0 20px rgba(255,0,128,0.6);
      transition: transform .2s ease;
    }
    .glow-btn:hover { transform: scale(1.05); }
    @keyframes glowMove {
      0%{background-position:0% 50%}
      50%{background-position:100% 50%}
      100%{background-position:0% 50%}
    }
  </style>
</head>

<body class="text-white min-h-screen flex flex-col justify-between">

  <!-- Navbar -->
  <header class="glass p-4 flex justify-between items-center">
    <h1 class="text-xl font-bold">⚡ UHD Bots</h1>
    <button onclick="toggleTheme()" class="p-2 rounded-lg glass">
      <i id="themeIcon" class="bi bi-moon-stars-fill"></i>
    </button>
  </header>

  <!-- File Info -->
  <main class="flex flex-col items-center justify-center text-center p-6 flex-1">
    <h2 class="text-2xl font-semibold animate__animated animate__fadeInDown">%s</h2>
    <p class="text-sm opacity-80">Your futuristic download is ready 🚀</p>
    
    <!-- Download Button -->
    <a href="%s" class="mt-6 glow-btn inline-flex items-center gap-2">
      <i class="bi bi-download"></i> Download (%s)
    </a>

    <!-- Copy + QR -->
    <div class="mt-4 flex flex-col sm:flex-row gap-3">
      <button onclick="copyLink()" class="glass px-4 py-2 rounded-lg">📋 Copy Link</button>
      <button onclick="generateQR()" class="glass px-4 py-2 rounded-lg">🔗 QR Code</button>
    </div>

    <div id="qrCode" class="mt-4"></div>
  </main>

  <!-- Footer -->
  <footer class="glass text-center py-4">
    <p class="text-xs">Made with ❤️ by UHD Bots</p>
  </footer>

  <!-- QR & Theme JS -->
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
  <script>
    function copyLink() {
      navigator.clipboard.writeText("%s");
      alert("✅ Link copied!");
    }
    function generateQR() {
      document.getElementById("qrCode").innerHTML = "";
      QRCode.toCanvas(document.getElementById("qrCode"), "%s", { width: 180 }, function (err) {
        if (err) console.error(err);
      });
    }
    function toggleTheme() {
      document.body.classList.toggle("bg-white");
      document.body.classList.toggle("text-black");
      const icon = document.getElementById("themeIcon");
      icon.classList.toggle("bi-brightness-high-fill");
      icon.classList.toggle("bi-moon-stars-fill");
    }
  </script>
</body>
</html>
