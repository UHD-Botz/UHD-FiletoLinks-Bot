<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>%s | UHD Bots</title>
  <link rel="icon" href="https://i.ibb.co/qJyZWCv/20230629-081948-0000.png" />
  <meta property="og:title" content="%s | UHD Bots">
  <meta property="og:description" content="Download your file instantly with UHD Bots futuristic downloader 🚀">
  <meta property="og:image" content="https://i.ibb.co/qJyZWCv/20230629-081948-0000.png">
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <!-- Animate.css -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
  <style>
    /* Animated Futuristic Neon Gradient Background */
    body {
      background: linear-gradient(135deg, #010917 0%, #232361 35%, #0f0c29 70%, #ff00b4 100%);
      background-size: 600% 600%;
      animation: gradientBG 14s ease-in-out infinite;
      font-family: 'Poppins', sans-serif;
      min-height: 100vh;
    }
    @keyframes gradientBG {
      0% {background-position:0% 50%;}
      50% {background-position:100% 50%;}
      100% {background-position:0% 50%;}
    }
    .glass {
      background: rgba(30,30,60,0.15);
      backdrop-filter: blur(20px) brightness(1.13);
      border: 1.5px solid rgba(255,255,255,.13);
      box-shadow: 0 0 40px #23236155, 0 0 8px #ff00b455, 0 2px 24px #11193144;
    }
    /* Neon Glowing Button */
    .glow-btn {
      background: linear-gradient(90deg,#23a6d5,#7928ca,#ff00b4);
      background-size: 300% 300%;
      animation: glowMove 8s ease infinite;
      border-radius: 14px;
      padding: 1.15rem 2.3rem;
      font-weight: bold;
      color: #fff;
      letter-spacing:1.3px;
      box-shadow: 0 0 16px #ff00b4a0, 0 0 24px #23a6d570;
      border: none;
      outline: none;
      font-family: 'Poppins', sans-serif;
      transition: transform .18s, box-shadow .19s;
    }
    .glow-btn:hover {
      transform: scale(1.07);
      box-shadow: 0 0 38px #ff00b4CC, 0 0 42px #23a6d588;
      background: linear-gradient(90deg,#ff00b4,#23a6d5,#7928ca);
    }
    @keyframes glowMove {
      0%{background-position:0% 50%;}
      50%{background-position:100% 50%;}
      100%{background-position:0% 50%;}
    }
    .futuristic-border {
      border: 2px solid #23a6d566 !important;
      box-shadow: 0 0 14px #7928ca44;
      border-radius: 16px;
    }
    .text-neon {
      text-shadow: 0 0 10px #23a6d5, 0 0 14px #ff00b4, 0 0 3px #fff;
      color: #fff;
    }
  </style>
</head>
<body class="text-white min-h-screen flex flex-col justify-between">
  <!-- Navbar -->
  <header class="glass p-5 mb-6 flex justify-between items-center futuristic-border animate_animated animate_fadeInDown">
    <h1 class="text-xl font-bold text-neon tracking-widest">⚡️ UHD Bots</h1>
    <button onclick="toggleTheme()" class="p-2 rounded-lg glass border border-purple-500">
      <i id="themeIcon" class="bi bi-moon-stars-fill"></i>
    </button>
  </header>

  <!-- File Info & Download -->
  <main class="flex flex-col items-center justify-center text-center flex-1">
    <div class="glass p-8 futuristic-border w-full max-w-lg animate_animated animate_fadeIn">
      <h2 class="text-2xl font-semibold text-neon mb-2 tracking-wide">%s</h2>
      <p class="text-md opacity-90 mb-6">Your futuristic download is ready 🚀</p>
      <div class="flex flex-col gap-5 items-center">
        <button class="glow-btn w-full" onclick="window.open('%s','_blank')"><i class="bi bi-download text-xl mr-2"></i> Download Now</button>
        <button class="glow-btn w-full" onclick="copyLink()"><i class="bi bi-link-45deg text-xl mr-2"></i> Copy Link</button>
        <div id="qrCode" class="mt-2"></div>
        <button class="glow-btn w-full" onclick="generateQR()"><i class="bi bi-qr-code text-xl mr-2"></i> Show QR</button>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="glass text-center py-4 mt-4 animate_animated animate_fadeInUp futuristic-border">
    <p class="text-xs opacity-80 text-neon">Made with <span class="text-pink-500">❤️</span> by UHD Bots</p>
  </footer>

  <!-- QR & Theme JS -->
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
  <script>
    function copyLink() {
      navigator.clipboard.writeText("%s");
      alert("✅ Link copied!");
    }
    function generateQR() {
      document.getElementById("qrCode").innerHTML = "";
      QRCode.toCanvas(document.getElementById("qrCode"), "%s", { width: 180, color: { dark:"#7928ca", light:"#ffffff00"} }, function (err) {
        if (err) console.error(err);
      });
    }
    function toggleTheme() {
      document.body.classList.toggle("bg-white");
      document.body.classList.toggle("text-black");
      const icon = document.getElementById("themeIcon");
      icon.classList.toggle("bi-brightness-high-fill");
      icon.classList.toggle("bi-moon-stars-fill");
    }
  </script>
</body>
</html>
