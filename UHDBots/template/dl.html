<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UHD File Stream</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto+Mono:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    /* Reset and Base Styles */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Roboto Mono', monospace;
      background: linear-gradient(-45deg, #0a0a0a, #1c2526, #13232f, #000000);
      background-size: 400% 400%;
      animation: gradient 15s ease infinite;
      color: #e0e0e0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }

    /* Gradient Animation */
    @keyframes gradient {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Container */
    .container {
      max-width: 800px;
      padding: 2rem;
      background: rgba(20, 20, 20, 0.8);
      border-radius: 15px;
      box-shadow: 0 0 40px rgba(0, 255, 255, 0.3), inset 0 0 10px rgba(0, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      text-align: center;
      position: relative;
      overflow: hidden;
      transition: transform 0.3s ease;
    }

    .container:hover {
      transform: translateY(-10px);
    }

    /* Title */
    h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 3.5rem;
      color: #00f0ff;
      text-shadow: 0 0 15px rgba(0, 240, 255, 0.7);
      margin-bottom: 1.5rem;
      position: relative;
      animation: neon-flicker 4s infinite;
    }

    @keyframes neon-flicker {
      0%, 100% { text-shadow: 0 0 15px rgba(0, 240, 255, 0.7), 0 0 30px rgba(0, 240, 255, 0.5); }
      50% { text-shadow: 0 0 10px rgba(0, 240, 255, 0.4), 0 0 20px rgba(0, 240, 255, 0.2); }
    }

    /* File Stream Button */
    .stream-btn {
      display: inline-block;
      padding: 1rem 2.5rem;
      font-size: 1.2rem;
      font-weight: 700;
      color: #fff;
      background: linear-gradient(90deg, #00f0ff, #ff00ff);
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
      margin: 1rem 0;
    }

    .stream-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px rgba(0, 240, 255, 0.5);
      background: linear-gradient(90deg, #ff00ff, #00f0ff);
    }

    .stream-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(
        90deg,
        transparent,
        rgba(255, 255, 255, 0.2),
        transparent
      );
      transition: 0.5s;
    }

    .stream-btn:hover::before {
      left: 100%;
    }

    /* Copy Link Button */
    .copy-btn {
      background: transparent;
      border: 2px solid #00f0ff;
      color: #00f0ff;
      padding: 0.8rem 2rem;
      font-size: 1rem;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 1rem;
    }

    .copy-btn:hover {
      background: #00f0ff;
      color: #000;
      box-shadow: 0 0 15px rgba(0, 240, 255, 0.5);
    }

    /* Particle Background Effect */
    .particles {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      background: rgba(0, 240, 255, 0.5);
      border-radius: 50%;
      animation: float 10s infinite linear;
    }

    @keyframes float {
      0% { transform: translateY(100vh) scale(0); }
      100% { transform: translateY(-100vh) scale(1); }
    }

    /* Responsive Design */
    @media (max-width: 768px) {
      h1 {
        font-size: 2.5rem;
      }

      .container {
        padding: 1.5rem;
      }

      .stream-btn, .copy-btn {
        padding: 0.8rem 1.5rem;
        font-size: 1rem;
      }
    }

    @media (max-width: 480px) {
      h1 {
        font-size: 2rem;
      }

      .container {
        margin: 1rem;
      }
    }
  </style>
</head>
<body>
  <div class="particles" id="particles"></div>
  <div class="container">
    <h1>🚀 UHD File Stream</h1>
    <p style="font-size: 1.2rem; margin-bottom: 1.5rem; color: #b0b0b0;">
      Stream and share your files with cutting-edge technology
    </p>
    <button class="stream-btn" onclick="startStream()">Start Streaming</button>
    <br />
    <button class="copy-btn" onclick="copyLink()">Copy Stream Link</button>
  </div>

  <script>
    // Copy Link Functionality
    function copyLink() {
      navigator.clipboard.writeText("{{ file_url }}").then(() => {
        alert("✅ Link copied to clipboard!");
      }).catch(err => {
        console.error('Failed to copy: ', err);
        alert("❌ Failed to copy link!");
      });
    }

    // Placeholder for Stream Function
    function startStream() {
      alert("🚀 Initiating UHD File Stream...");
      // Add your streaming logic here
    }

    // Particle Animation
    const particlesContainer = document.getElementById('particles');
    function createParticle() {
      const particle = document.createElement('div');
      particle.classList.add('particle');
      particle.style.width = ${Math.random() * 5 + 2}px;
      particle.style.height = particle.style.width;
      particle.style.left = ${Math.random() * 100}%;
      particle.style.animationDuration = ${Math.random() * 5 + 5}s;
      particle.style.opacity = Math.random() * 0.5 + 0.2;
      particlesContainer.appendChild(particle);
      setTimeout(() => particle.remove(), 10000);
    }

    setInterval(createParticle, 300);
  </script>
</body>
</html>
